<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Demo terrain preview</title>
  <desc id="desc">Static fallback preview of a terrain tile with highlighted accumulation areas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5f8ff" />
      <stop offset="100%" stop-color="#d4f0cd" />
    </linearGradient>
    <linearGradient id="ridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6aa6bf" />
      <stop offset="100%" stop-color="#50775d" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <path d="M0,580 C210,440 300,620 480,510 C660,400 760,520 940,430 C1080,360 1180,420 1280,390 L1280,720 L0,720 Z" fill="url(#ridge)" opacity="0.56" />
  <path d="M130,530 C300,470 420,560 560,490 C720,410 840,500 1030,450 C1120,430 1200,450 1260,430" fill="none" stroke="#77d5f2" stroke-width="18" stroke-linecap="round" opacity="0.8" />
  <path d="M170,520 C320,476 438,548 560,500 C710,440 850,490 1010,456" fill="none" stroke="#2f9bb9" stroke-width="10" stroke-linecap="round" opacity="0.76" />
  <text x="56" y="92" font-family="Inter, Arial, sans-serif" font-size="45" fill="#134459" opacity="0.86">Interactive 3D Map Loading...</text>
</svg>
